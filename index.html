<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pro v1.1.13</title>
    <style>
        :root { --bg: #1a1a1a; --card: #222; --text: #ffcc00; --btn: #333; --grid-line: #ccc; --note-color: #000; }
        body { background: var(--bg); color: #eee; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        body.pencil-mode { --grid-line: #eee; --note-color: #555; }
        
        /* UI Elements */
        .hud { width: 100%; max-width: 450px; background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border: 1px solid #333; }
        input { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 5px; font-size: 1.1rem; }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; max-width: 450px; }
        button { background: var(--btn); border: 1px solid #444; color: #eee; padding: 12px 2px; border-radius: 8px; font-weight: bold; font-size: 0.95rem; cursor: pointer; }
        
        .btn-dir { border: 2px solid var(--text); color: var(--text); height: 70px; font-size: 1.8rem; grid-column: span 2; }
        .btn-dist { background: var(--text); color: #000; }
        .btn-next { background: #0056b3; color: white; grid-column: span 4; height: 55px; font-size: 1.2rem; margin: 4px 0; border: none; }
        .btn-pencil { background: #555; color: #fff; }
        .btn-print { background: #1a4a1a; grid-column: span 4; margin-top: 8px; height: 50px; }

        /* Preview Grid */
        #preview-area { width: 100%; max-width: 450px; background: white; color: var(--note-color); margin-top: 20px; padding: 15px; border-radius: 5px; box-sizing: border-box; }
        .notes-grid { display: grid; grid-template-columns: repeat(5, 1fr); border: 1px solid var(--grid-line); }
        .note-cell { border: 1px solid var(--grid-line); height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; text-align: center; background: white; color: inherit; }

        @media print {
            .hud, .grid-container, .btn-next, .btn-print, button { display: none !important; }
            body { background: white !important; padding: 0; margin: 0; }
            #preview-area { width: 100% !important; max-width: none !important; margin: 0 !important; }
            .note-cell { height: 140px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="hud">
        <input type="text" id="stage-name" value="QRally">
        <div id="counter" style="text-align:center; font-size: 0.8rem; margin-top:5px; color:#888;">Box 1 active</div>
    </div>

    <div class="grid-container">
        <button class="btn-dir" onclick="buildCall('L')">L</button>
        <button class="btn-dir" onclick="buildCall('R')">R</button>
        
        <button onclick="buildCall('6')">6</button>
        <button onclick="buildCall('5')">5</button>
        <button onclick="buildCall('4')">4</button>
        <button onclick="buildCall('3')">3</button>
        <button onclick="buildCall('2')">2</button>
        <button onclick="buildCall('1')">1</button>
        <button onclick="buildCall('Crest')">Crest</button>
        <button onclick="buildCall('Into')">Into</button>
        <button onclick="buildCall('Jump')">Jump</button>
        <button onclick="buildCall('Slippy')">Slippy</button>
        <button onclick="buildCall('>')">></button>
        <button onclick="buildCall('<')"><</button>

        <button class="btn-dist" onclick="buildCall('50')">50</button>
        <button class="btn-dist" onclick="buildCall('100')">100</button>
        <button class="btn-dist" onclick="buildCall('200')">200</button>
        <button class="btn-dist" onclick="customNumber()">#</button>

        <button class="btn-next" onclick="nextNote()">NEXT NOTE (New Box)</button>
        
        <button class="btn-pencil" id="pencil-btn" onclick="togglePencil()" style="grid-column: span 2;">PENCIL MODE: OFF</button>
        <button onclick="undo()" style="grid-column: span 2; background:#4a1a1a;">UNDO</button>
        
        <button class="btn-print" onclick="window.print()">PRINT CLEAN PDF GRID</button>
    </div>

    <div id="preview-area">
        <h2 id="preview-title" style="margin:0 0 10px 0; font-family:sans-serif; text-transform: uppercase;">QRally</h2>
        <div class="notes-grid" id="main-grid">
            <div class="note-cell active-cell" id="cell-0"></div>
        </div>
    </div>

    <script>
        let gridData = [""];
        let currentIndex = 0;

        function buildCall(val) {
            gridData[currentIndex] += val + " ";
            renderGrid();
        }

        function customNumber() {
            let num = prompt("Enter distance or number:");
            if (num) buildCall(num);
        }

        function nextNote() {
            currentIndex++;
            gridData[currentIndex] = "";
            renderGrid();
            document.getElementById('counter').innerText = "Box " + (currentIndex + 1) + " active";
        }

        function togglePencil() {
            document.body.classList.toggle('pencil-mode');
            const isPencil = document.body.classList.contains('pencil-mode');
            document.getElementById('pencil-btn').innerText = isPencil ? "PENCIL MODE: ON" : "PENCIL MODE: OFF";
        }

        function undo() {
            if (gridData[currentIndex].length > 0) {
                let parts = gridData[currentIndex].trim().split(" ");
                parts.pop();
                gridData[currentIndex] = parts.join(" ") + (parts.length > 0 ? " " : "");
            } else if (currentIndex > 0) {
                gridData.pop();
                currentIndex--;
            }
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = "";
            gridData.forEach((content, i) => {
                const cell = document.createElement('div');
                cell.className = "note-cell";
                cell.innerText = content;
                grid.appendChild(cell);
            });
            document.getElementById('preview-title').innerText = document.getElementById('stage-name').value;
        }
    </script>
</body>
</html>
