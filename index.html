<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QRally Pacenotes Pro</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <style>
        :root { --yellow: #ffcc00; --dark-bg: #121212; --card-bg: #1e1e1e; --btn-bg: #2d2d2d; --handwriting: 'Architects Daughter', cursive; --text: #fff; }
        
        /* Theme Overrides */
        body.day-mode { --dark-bg: #d4d4d4; --card-bg: #e0e0e0; --btn-bg: #c0c0c0; --text: #1a1a1a; }
        body.day-mode #preview-window { background: #eee; border-color: #999; color: #000; }

        body.dusk-mode { --dark-bg: #1a1c2c; --card-bg: #252a45; --btn-bg: #353b5f; --text: #e0e0e0; }
        body.dusk-mode #preview-window { background: #0f111a; border-color: #353b5f; color: #4deeea; }

        body { font-family: sans-serif; background: var(--dark-bg); color: var(--text); margin: 0; padding: 10px; display: flex; justify-content: center; transition: 0.3s; overflow-x: hidden; }
        #app-interface { width: 100%; max-width: 440px; background: var(--card-bg); padding: 15px; border-radius: 24px; border: 1px solid #444; }
        
        #preview-window { 
            background: #000; border-radius: 15px; min-height: 115px; margin-bottom: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: var(--handwriting); color: var(--yellow); padding: 15px; text-align: center;
            border: 2px solid #333; position: relative;
        }
        #speed-readout { font-size: 0.75rem; color: #888; position: absolute; top: 8px; font-family: sans-serif; font-weight: bold; width: 90%; }
        #display-text { font-size: 2rem; margin-top: 15px; }

        .grid { display: grid; gap: 8px; margin-bottom: 10px; }
        .cols-2 { grid-template-columns: 1fr 1fr; }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }
        .cols-6 { grid-template-columns: repeat(6, 1fr); }
